<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết Quả Phân Tích - AI Malware Detector</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .result-container {
      max-width: 560px;
      width: 92%;
      padding: 50px 30px;
      background: rgba(20, 20, 35, 0.85);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(254, 193, 149, 0.2);
      text-align: left;
    }

    .status-badge {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      margin: 25px 0;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .malware { 
      background: linear-gradient(90deg, #ff3d00, #c62828); 
      color: white; 
    }
    .benign  { 
      background: linear-gradient(90deg, #00c853, #2e7d32); 
      color: white; 
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid rgba(254, 193, 149, 0.15);
      font-size: 1.05rem;
    }

    .result-row:last-child { 
      border-bottom: none; 
    }

    .label { color: #b8a88a; }
    .value { font-weight: 600; color: #e0d4b8; }

    .loading {
      text-align: center;
      color: #fec195;
      font-style: italic;
      margin: 40px 0;
    }

    .back-link {
      margin-top: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fec195;
      text-decoration: none;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="result-container">
    <h2 style="text-align:center; margin-bottom:8px;">Kết Quả Phân Tích Malware</h2>
    
    <div id="loading" class="loading">Đang tải kết quả phân tích...</div>

    <div id="resultContent" style="display: none;">
      <p id="filename" style="text-align:center; color:#b8a88a; margin-bottom:30px; font-size:1.1rem;"></p>

      <div id="statusBadge" class="status-badge"></div>

      <div class="result-row">
        <span class="label">Xác suất Malware:</span>
        <span class="value" id="probability"></span>
      </div>
      <div class="result-row">
        <span class="label">Trạng thái:</span>
        <span class="value" id="status"></span>
      </div>
      <div class="result-row">
        <span class="label">Kích thước file:</span>
        <span class="value" id="filesize"></span>
      </div>
      <div class="result-row">
        <span class="label">Số section:</span>
        <span class="value" id="sections"></span>
      </div>
      <div class="result-row">
        <span class="label">Import functions:</span>
        <span class="value" id="imports"></span>
      </div>
    </div>

    <a href="upload.html" class="back-link">← Quay lại tải file mới</a>
  </div>

  <footer style="margin-top:50px; color:#555;">© 2026 Deptraiteam • Malware Analysis Tool</footer>

  <script>
    async function loadResult() {
      const scanId = localStorage.getItem('lastScanId');
      console.log("Retrieved scan_id from localStorage:", scanId);   // Debug

      const loadingEl = document.getElementById('loading');
      const resultContent = document.getElementById('resultContent');

      if (!scanId) {
        loadingEl.innerHTML = `
          <p style="color:#ff5252;">Không tìm thấy scan_id. Bạn chưa quét file nào!</p>
          <p style="margin-top:20px;">
            <a href="upload.html" style="color:#fec195; font-size:1.1rem;">← Quay lại trang upload</a>
          </p>
        `;
        return;
      }

      try {
        loadingEl.textContent = "Đang lấy kết quả từ server...";

        const response = await fetch(`http://127.0.0.1:8000/scan/result/${scanId}`);
        
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('Không tìm thấy kết quả. Scan có thể đã hết hạn hoặc không tồn tại.');
          }
          throw new Error(`Server lỗi: ${response.status}`);
        }

        const result = await response.json();

        loadingEl.style.display = 'none';
        resultContent.style.display = 'block';

        document.getElementById('filename').textContent = result.filename || "Unknown.exe";

        const probPercent = (result.malware_probability * 100).toFixed(2);
        document.getElementById('probability').textContent = probPercent + "%";

        const isMalware = result.is_malware === true;
        const badge = document.getElementById('statusBadge');
        const statusEl = document.getElementById('status');

        if (isMalware) {
          badge.classList.add('malware');
          badge.textContent = `MALWARE (${probPercent}%)`;
          statusEl.textContent = "Nguy hiểm - Malware";
          statusEl.style.color = "#ff5252";
        } else {
          badge.classList.add('benign');
          badge.textContent = `BENIGN (${probPercent}%)`;
          statusEl.textContent = "An toàn - Benign";
          statusEl.style.color = "#00e676";
        }

        document.getElementById('filesize').textContent = 
          result.file_size_bytes ? (result.file_size_bytes / 1024).toFixed(1) + " KB" : "N/A";

        document.getElementById('sections').textContent = result.num_sections || "N/A";
        document.getElementById('imports').textContent = result.import_function_count || "N/A";

      } catch (error) {
        console.error(error);
        loadingEl.innerHTML = `
          <p style="color:#ff5252;">${error.message}</p>
          <p style="margin-top:20px;">
            <a href="upload.html" style="color:#fec195;">← Quay lại trang upload và thử lại</a>
          </p>
        `;
      }
    }

    window.onload = loadResult;
  </script>
</body>
</html>
