<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Phân Tích Malware</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>AI Phân Tích Malware</h2>
    <p class="subtitle">Tải lên file .exe để kiểm tra nguy cơ</p>

    <div class="upload-area" id="uploadArea">
      <input type="file" accept=".exe" id="fileInput">
      
      <label for="fileInput" class="custom-file-upload">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </div>
        <div class="text">
          <span class="upload-text">Click để tải file lên</span>
          <span class="upload-subtext">hoặc kéo thả file .exe vào đây</span>
        </div>
      </label>
    </div>

    <div class="file-info" id="fileInfo">
      <span>📄</span>
      <span class="file-name" id="fileName">Tên file.exe</span>
      <button class="remove-btn" id="removeBtn">✕</button>
    </div>

    <button id="analyzeBtn">Phân Tích Ngay</button>

    <div class="loader" id="loader" style="display: none;"></div>

    <a href="home.html" class="back-link">← Quay lại trang chủ</a>

    <div class="thankyou">
      Cảm ơn bạn đã sử dụng công cụ của chúng tôi!
    </div>
  </div>

  <footer>© 2026 HUYNH GIA BAO - MINH DUC • Malware Analysis Tool</footer>

  <script src="upload.js"></script>
</body>
</html>
